name: Daily Automated Actions
on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'

jobs:
  daily-run:
    name: 'Runs daily'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python version 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Refresh sneaker catalog
        run: |
          sneaker-launchpad refresh
